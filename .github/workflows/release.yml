name: Release (auto-version + publish)

# Every push/merge to main automatically bumps the patch version, tags it,
# and publishes to npm. The version-bump commit is marked [skip ci] so it
# does not re-trigger this workflow (no infinite loop).
#
# One-time setup: repo secret NPM_TOKEN must hold an npm *automation* token
# (npmjs.com -> Access Tokens -> Generate -> Automation).

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the run created by our own version-bump commit.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Bump patch version (commit + tag)
        run: |
          npm version patch -m "chore(release): v%s [skip ci]"
      - name: Push version commit and tag
        run: git push --follow-tags
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
